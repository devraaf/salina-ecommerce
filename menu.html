<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="src/styles/styles.css">
    <link rel="stylesheet" href="src/styles/layout.css">
    <link rel="shortcut icon" href="src/images/logos/favicon.svg" type="image/x-icon">
    <title>Salina | Cardápio</title>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <img src="src/images/logos/logo.svg" alt="logotipo">
            </div>
            <nav class="nav-menu">
                <ul class="menu-items">
                    <li class="menu-item"><a href="index.html">Início</a></li>
                    <li class="menu-item"><a href="menu.html">Cardápio</a></li>
                </ul>
            </nav>
            <button class="cart-btn" data-modal="cart-modal">
                <i class="fa-solid fa-cart-shopping"></i>
            </button>
        </div>
    </header>
    <dialog id="cart-modal">
        <div class="header-cart">
            <i class="fa-solid fa-cart-shopping"></i>
            <h4>Seu carrinho</h4>
            <button class="close-cart" data-modal="cart-modal">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="cart-container">
            <div class="empty-cart">
                <i class="fa-solid fa-cart-shopping cart-modal"></i>
                <p class="title">Seu carrinho está vazio</p>
                <p>Adicione seus pratos favoritos!</p>
            </div>
            <div class="product">
                <img src="src/images/products/camaroes.png" alt="">
                <div class="data-product">
                    <p class="tittle">Nome do prato</p>
                    <span class="price">R$ 90,00</span>
                    <div class="qtd-area">
                        <button>
                            <i class="fa-solid fa-minus"></i>
                        </button>
                        <span class="qtd-item">1</span>
                        <button>
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer-cart">
            <div class="total">
                <h3>TOTAL:</h3>
                <span>R$ 0,00</span>
            </div>
            <button>FINALIZAR PEDIDO</button>
        </div>
    </dialog>
    <main>
        <section class="products">
            <h1>
                <img src="src/images/titulos/Cardapio.svg" alt="">
            </h1>
            <div class="products-container" id="products-container">
                
            </div>
        </section>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="src/images/logos/logo-footer.svg" alt="logotipo">
            </div>
            <div class="footer-contact">
                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fa-solid fa-phone"></i>
                    </div>
                    <span>(11) 92345-6789</span>
                </div>
                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>
                    <span>Estrada das Ostras, 90</span>
                </div>
                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <span>contato@salina.com.br</span>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <hr>
            <p>© 2026 Restaurante Salina | Desenvolvido por: Maria Eduarda Aurélio e Rafaela Campos</p>
        </div>
    </footer>
    <script src="src/javascript/script.js"></script>
    <script src="src/javascript/cart.js"></script>
</body>
</html>
